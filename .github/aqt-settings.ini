[aqt]
baseurl: https://ftp.yz.yamagata-u.ac.jp/pub/qtproject
concurrency: 4

[requests]
connection_timeout: 10
response_timeout: 60
max_retries_on_connection_error: 5
retry_backoff: 0.5
INSECURE_NOT_FOR_PRODUCTION_ignore_hash: True

[mirrors]
trusted_mirrors:
    https://ftp.yz.yamagata-u.ac.jp/pub/qtproject
fallbacks:
    https://ftp.yz.yamagata-u.ac.jp/pub/qtproject
