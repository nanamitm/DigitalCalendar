[aqt]
baseurl: https://download.qt.io
concurrency: 4

[requests]
connection_timeout: 10
response_timeout: 60
max_retries_on_connection_error: 5
retry_backoff: 0.5
INSECURE_NOT_FOR_PRODUCTION_ignore_hash: True

[mirrors]
trusted_mirrors:
    https://download.qt.io
fallbacks:
    https://download.qt.io
